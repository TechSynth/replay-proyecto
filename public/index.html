<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rePLAY - Streaming Musical</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h1>rePLAY</h1>
            </div>

            <nav class="main-nav">
                <ul>
                    <li class="active">
                        <a href="#" data-view="home">
                            <i class="fas fa-home"></i>
                            <span>Inicio</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-view="search">
                            <i class="fas fa-search"></i>
                            <span>Buscar</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-view="library">
                            <i class="fas fa-book"></i>
                            <span>Mi Biblioteca</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="playlists">
                <h3>Mis Playlists</h3>
                <ul id="playlist-list">
                    <!-- carga de playlist -->
                </ul>
            </div>
        </aside>

        <!-- contenido principal -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="¿Qué quieres escuchar?">
                    <button id="search-btn">Buscar</button>
                </div>
                <div class="user-menu">
                    <span id="user-name">Usuario Demo</span>
                    <button id="logout-btn" class="logout-btn" title="Cerrar sesión">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <section id="home-view">
                    <h2>Canciones Recientes</h2>
                    <div class="songs-grid" id="songs-grid">
                        <!-- Las canciones se cargarán aquí -->
                    </div>
                </section>

                <section id="search-view" style="display: none;">
                    <h2>Resultados de Búsqueda</h2>
                    <div class="songs-grid" id="search-results">
                        <!-- Resultados de búsqueda -->
                    </div>
                </section>

                <section id="library-view" style="display: none;">
                    <h2>Mi Biblioteca</h2>
                    <button id="create-playlist-btn" class="btn-create-playlist">
                        <i class="fas fa-plus"></i> Nueva Playlist
                    </button>
                    <div class="library-content">
                        <div id="user-playlists-container">
                            <p>Aquí aparecerán tus playlists</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Reproductor de música -->
    <footer class="player">
        <div class="player-left">
            <div class="song-info">
                <div class="song-image">
                    <i class="fas fa-music"></i>
                </div>
                <div class="song-details">
                    <div class="song-title" id="current-song-title">Selecciona una canción</div>
                    <div class="song-artist" id="current-song-artist">-</div>
                </div>
            </div>
        </div>

        <div class="player-center">
            <div class="player-controls">
                <button class="control-btn" id="prev-btn">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-btn" id="play-btn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn" id="next-btn">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>
            <div class="player-progress">
                <span class="time" id="current-time">0:00</span>
                <div class="progress-bar">
                    <div class="progress-filled" id="progress-filled"></div>
                </div>
                <span class="time" id="total-time">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <button class="control-btn" id="volume-btn">
                <i class="fas fa-volume-up"></i>
            </button>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="70">
        </div>
    </footer>

    <!-- Modal para crear playlist -->
    <div id="modal-create-playlist" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Crear Nueva Playlist</h3>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <form id="create-playlist-form">
                <div class="form-group">
                    <label for="playlist-name">Nombre de la Playlist:</label>
                    <input type="text" id="playlist-name" placeholder="Mi playlist favorita" required>
                </div>
                <div class="form-group">
                    <label for="playlist-description">Descripción:</label>
                    <textarea id="playlist-description" placeholder="Descripción opcional"></textarea>
                </div>
                <div class="form-group">
                    <label for="playlist-public">
                        <input type="checkbox" id="playlist-public">
                        Hacer pública esta playlist
                    </label>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-submit">Crear</button>
                    <button type="button" class="btn-cancel" id="modal-cancel-btn">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>

</html>
